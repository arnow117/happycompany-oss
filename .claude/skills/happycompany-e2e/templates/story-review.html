<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #191916; background: #fbfaf7; line-height: 1.55; }
    header { padding: 48px 6vw 28px; background: #ebe5da; border-bottom: 1px solid #ded8cd; }
    main { max-width: 1180px; margin: 0 auto; padding: 28px 32px 64px; }
    h1 { margin: 0; font-size: clamp(32px, 5vw, 56px); line-height: 1.05; letter-spacing: 0; }
    h2 { margin: 42px 0 16px; font-size: 25px; letter-spacing: 0; }
    h3 { margin: 0 0 8px; font-size: 18px; letter-spacing: 0; }
    p { margin: 0; }
    a { color: #245f91; text-decoration: none; border-bottom: 1px solid rgba(36, 95, 145, 0.25); }
    .lead { margin-top: 18px; max-width: 900px; color: #3d3932; font-size: 18px; }
    .meta, .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill, .tag { display: inline-flex; align-items: center; min-height: 28px; padding: 4px 9px; border-radius: 999px; background: #fff; border: 1px solid #ded8cd; font-size: 13px; font-weight: 650; }
    .summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-top: -24px; }
    .metric, .story, .note { padding: 18px; border: 1px solid #ded8cd; border-radius: 8px; background: #fff; }
    .metric strong { display: block; font-size: 34px; line-height: 1; margin-bottom: 10px; }
    .metric span, .story p, .note p { color: #68635b; font-size: 14px; }
    .story-grid, .note-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .checks { margin: 10px 0 0; padding-left: 19px; font-size: 14px; }
    figure { margin: 0; border: 1px solid #ded8cd; border-radius: 8px; overflow: hidden; background: #fff; }
    figure img { display: block; width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-bottom: 1px solid #ded8cd; }
    figcaption { padding: 10px 12px; color: #68635b; font-size: 13px; }
    @media (max-width: 880px) { main { padding: 24px 16px 48px; } .summary, .story-grid, .note-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <p class="pill">{{DATE}}</p>
    <h1>{{TITLE}}</h1>
    <p class="lead">{{SUMMARY}}</p>
    <div class="meta">{{META_PILLS}}</div>
  </header>
  <main>
    <section class="summary">{{METRICS}}</section>
    <section>
      <h2>产品故事地图</h2>
      <div class="story-grid">{{STORY_CARDS}}</div>
    </section>
    <section>
      <h2>截图证据</h2>
      {{SCREENSHOTS}}
    </section>
    <section>
      <h2>还没有覆盖什么</h2>
      <div class="note-grid">{{GAPS}}</div>
    </section>
  </main>
</body>
</html>
