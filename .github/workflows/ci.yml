name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck · build · unit/integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Typecheck (backend)
        run: npm run typecheck

      - name: Typecheck + build (web)
        run: npm --prefix web run build

      - name: Backend unit + integration tests
        run: npm test

      - name: Web component tests
        run: npm --prefix web test

  e2e:
    name: Playwright E2E (mainline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Install Playwright browsers
        run: npm --prefix web exec -- playwright install --with-deps chromium chromium-headless-shell

      - name: Run mainline E2E
        run: npm --prefix web run test:e2e:mainline

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 14
