id: project-kickoff
name: 项目启动
role: project-manager
description: 项目经理围绕客户目标、范围、里程碑和团队分工生成项目启动上下文。
triggerExamples:
  - 帮我整理这个项目的启动计划
  - 新客户项目要开工了
  - 把需求拆给顾问
steps:
  - 收集客户背景、目标、范围、预算、周期和关键干系人
  - 梳理里程碑、交付物、风险和待确认问题
  - 生成顾问任务包和客户沟通纪要
  - 标注后续需要财务跟踪的合同与结算节点
missingInfoPolicy: 缺少客户目标、范围或交付周期时，先输出待确认清单，不下最终计划。

