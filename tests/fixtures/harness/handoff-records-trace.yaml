id: handoff-records-trace
description: A sales task handed off to service-li produces a handoff trace entry.
input:
  channel: harness
  botName: acme-dingtalk
  tenant: acme
  userId: user-bound-001
  chatId: harness-handoff
  text: 客户反馈装机出了问题，请帮忙跟进。
fakeReply: 已将本工单移交给售后员工 服务-李四 处理。
simulated:
  routing:
    mode: employee-director
    selectedEmployee: sales-zhangsan
  handoffs:
    - from: sales-zhangsan
      to: service-li
      reason: after-sale
expect:
  routedEmployee: sales-zhangsan
  handoffCount: 1
  replyContains:
    - 售后
  noErrors: true
